# Model Evaluation Orchestrator Configuration
# ---------------------------------------------------------
# Data settings
# ---------------------------------------------------------
data:
  # Path to validation/evaluation tiles directory
  data_root: "data/processed/tiles/marius_hills"
  batch_size: 8
  num_workers: 8 # dynamic multi-threaded loading

# ---------------------------------------------------------
# Models to evaluate
# ---------------------------------------------------------
models:
  - name: "Mask-RCNN-Best"
    type: "cnn" # semantic, cnn, or panoptic
    checkpoint_path: "data/MR/weights/mask_rcnn_final.pth"
    class: "lunar_segmentation.models.maskrcnn.MaskRCNN"
    # Arguments passed directly to the model constructor
    args:
      num_classes: 8
      pretrained: false

# ---------------------------------------------------------
# Evaluation Parameters
# ---------------------------------------------------------
eval_params:
  threshold: 0.5
  from_logits: false
  bootstrap_confidence: 0.95
  n_resamples: 1000

# ---------------------------------------------------------
# Output settings & Plots to generate
# ---------------------------------------------------------
outputs:
  report_dir: "outputs/evaluation"
  plots:
    prediction_panel: true
    class_comparison: true
    metrics_summary: true
    model_comparison: true
    threshold_sensitivity: true
    max_panel_samples: 5
