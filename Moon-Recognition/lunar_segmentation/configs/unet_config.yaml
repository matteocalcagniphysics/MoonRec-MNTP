# Training configuration for lunar crater segmentation
# ---------------------------------------------------------
# Model
# ---------------------------------------------------------
in_channels: 3
num_classes: 7          # reale: 7 classi one-hot nel dataset (era 4)
base_width: 32
depth: 4                # +1 level vs original (was 3)
bottleneck_dropout: 0.3 # regularisation at the deepest layer
decoder_dropout: 0.1    # light regularisation in the decoder

# ---------------------------------------------------------
# Training
# ---------------------------------------------------------
batch_size: 8
epochs: 60              # was 20 — too few for a 4-level UNet to converge
seed: 42

# Optimizer
optimizer: adamw        # was adam — AdamW adds weight decay for free
lr: 0.0003              # was 0.001 — lower LR pairs better with AdamW
weight_decay: 0.0001

# LR scheduler: cosine annealing restarts
scheduler: cosine
T_max: 60               # match epochs
eta_min: 0.000005       # floor LR

# Early stopping
early_stopping_patience: 12   # stop if val loss doesn't improve for 12 epochs

# ---------------------------------------------------------
# Data
# ---------------------------------------------------------
tile_size: 256
stride: 128             # 50% overlap — good, keep it
augment: true

# Augmentation ops (applied randomly during training)
augmentations:
  horizontal_flip: true
  vertical_flip: true
  rotate_90: true
  brightness_jitter: 0.2
  contrast_jitter: 0.2

# ---------------------------------------------------------
# Loss
# ---------------------------------------------------------
loss: bce_dice          # BCEDiceLoss — expects one-hot masks (B, 7, H, W)
bce_weight: 0.5
dice_weight: 0.5

# Per-class weights — calcolati da distribuzione reale (15905 tile analizzate)
# formula: 100.0 / percentuale_classe
# impact_crater: 100.0% -> peso 1.0   (presente ovunque, nessun upweight)
# candidate_rille: 0.1% -> peso 795  (rarissima, fortemente upweighted)
class_weights:
  impact_crater:         1.0   # 15905/15905 = 100.0%
  pit_skylight:         64.7   # 15905/246   =   1.5%
  wrinkle_ridge:         5.3   # 15905/2987  =  18.8%
  lobate_scarp:         58.7   # 15905/271   =   1.7%
  irregular_mare_patch: 154.4  # 15905/103   =   0.6%
  apollo_site:           90.9  # 15905/175   =   1.1%
  candidate_rille:      795.3  # 15905/20    =   0.1%

# ---------------------------------------------------------
# Inference
# ---------------------------------------------------------
adjusted_threshold: 0.35   # was 0.1 — reduces false positives
