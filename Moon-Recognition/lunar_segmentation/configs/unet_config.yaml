# Lunar crater segmentation — SmallUNet training config

# --- Model ---
in_channels: 3        # channels built by build_three_channel_input()
num_classes: 7        # one binary mask per class, one-hot (B, 7, H, W)
base_width: 32        # encoder filters: 32→64→128→256→512
depth: 4              # encoder/decoder levels (original: 3)
bottleneck_dropout: 0.3
decoder_dropout: 0.1

# --- Training ---
batch_size: 8
epochs: 60
seed: 42

optimizer: adamw      # AdamW folds weight decay into the update step
lr: 0.0003
weight_decay: 0.0001

scheduler: cosine     # smooth decay from lr to eta_min over T_max epochs
T_max: 60             # must match epochs
eta_min: 0.000005

early_stopping_patience: 12  # stop if val loss stalls for 12 epochs

# --- Data ---
tile_size: 256
stride: 128           # 50% overlap
augment: true

# Geometric transforms applied identically to image AND mask
augmentations:
  horizontal_flip: true
  vertical_flip: true
  rotate_90: true
  brightness_jitter: 0.2
  contrast_jitter: 0.2

# --- Loss: WeightedBCEDiceLoss ---
loss: bce_dice
bce_weight: 0.5
dice_weight: 0.5

# weight = 100 / class_frequency — computed on 15,905 tiles
# class                tiles   freq     weight
# impact_crater        15905   100.0%    1.0
# wrinkle_ridge         2987    18.8%    5.3
# pit_skylight           246     1.5%   64.7
# lobate_scarp           271     1.7%   58.7
# apollo_site            175     1.1%   90.9
# irregular_mare_patch   103     0.6%  154.4
# candidate_rille         20     0.1%  795.3
class_weights:
  impact_crater:         1.0
  pit_skylight:         64.7
  wrinkle_ridge:         5.3
  lobate_scarp:         58.7
  irregular_mare_patch: 154.4
  apollo_site:           90.9
  candidate_rille:      795.3

# --- Inference ---
adjusted_threshold: 0.35  # lower → more detections; higher → fewer false positives